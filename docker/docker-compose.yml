services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - fdp-net

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongodb:27017/fdp
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      FRONTEND_ORIGIN: http://localhost:5500
    depends_on:
      - mongodb
    networks:
      - fdp-net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "5500:80"
    networks:
      - fdp-net

volumes:
  mongo_data:

networks:
  fdp-net:
